<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="question-section">
            <h1 id="question">Will you be my Valentine? 💖</h1>
            <img id="main-gif" src="https://media3.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3aHF5NjhyNHRkM3JiZGxncDI0azN0dnFpYTBxMHB6b2xub2hzcXl4cSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/RJzv5gG13bFsER317k/giphy.webp" alt="Cute Cat">
            
            <div class="buttons">
                <button id="yesBtn">Yes</button>
                <button id="noBtn">No</button>
            </div>
        </div>

        <div id="success-section" class="hidden">
            <h1>Knew you would say yes! 🎉</h1>
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueG56Znd6Znd6Znd6Znd6Znd6Znd6Znd6Znd6Znd6Znd6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/v4a3XfS0j7S5G/giphy.gif" alt="Happy Dance">
            <p>You just made me the happiest person!</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
